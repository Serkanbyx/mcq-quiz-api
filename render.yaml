services:
  - type: web
    name: mcq-quiz-api
    runtime: node
    plan: free
    buildCommand: npm install && npm run seed
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_PATH
        value: ./data/quiz.db
    disk:
      name: quiz-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
